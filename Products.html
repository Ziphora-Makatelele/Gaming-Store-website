<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    body {
      background-image: url("img3.jpg");
      font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;

    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    @import url('https://fonts.googleapis.com/css2?family=Alkatra&family=Anton&family=Bebas+Neue&family=Jost:ital,wght@1,600&family=Lexend:wght@700&family=Nova+Oval&family=Oswald:wght@500&family=PT+Serif:wght@700&family=Titillium+Web&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');

    .no-radius,
    button,
    .product-card,
    .filter-btn,
    .expanded-detail,
    .cart-toast,
    .badge,
    .add-cart-expand,
    .close-detail-btn,
    .card-img,
    .products-grid,
    .filter-bar {
      border-radius: 0px !important;
    }

    /* nav stuff*/
    .navbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 24px 40px;
      z-index: 100;
      background: transparent;
    }

    
    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links li a {
      color: #fafafa;
      text-decoration: none;
      font-size: 16px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      transition: opacity 0.2s;
    }

    .nav-links li a:hover {
      opacity: 0.7;
    }

    .nav-links li a.active {
      color: #00d4ff !important;
        text-decoration: underline;
        text-decoration-thickness: 2px;
        text-underline-offset: 8px;
    }

    /* sorting nav */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 6rem auto 2rem;
      padding: 0 5% 1rem 5%;
      overflow: visible;
      width: 100%;
    }

    .filter-btn {
      background: #0a1222;
      border: 2px solid #30446d;
      color: #30446d;
      padding: 0.6rem 1.4rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
      font-size: 0.85rem;
      border-radius: 50px !important;
      letter-spacing: 0.5px;
      text-shadow: 0 0 5px #30446d;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: #30446d;
      border-color: #30446d;
      color: #0a0f1c;
      box-shadow: 0 0 20px #30446d;
      text-shadow: none;
    }

    /* products grid */
    .products-wrapper {
      max-width: 1400px;
      margin: 1rem auto 4rem;
      padding: 0 5%;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .product-card {
      background: #1f2a44;
      border: 1px solid #30446d;
      transition: all 0.25s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-3px);
      border-color: #783697;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
    }

    .card-img {
      height: 240px;
      background: #0f172a;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .product-card:hover .card-img img {
      transform: scale(1.02);
    }

    .card-info {
      padding: 1.2rem;
    }

    .category {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #30446d;
      letter-spacing: 1px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
    }

    .product-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0.4rem 0;
      font-family: 'Poppins', sans-serif;
    }

    .price {
      font-size: 1.2rem;
      font-weight: 700;
      color: #c0e0ff;
      font-family: 'Poppins', sans-serif;
    }

    .old-price {
      font-size: 0.85rem;
      color: #7b8aa3;
      text-decoration: line-through;
      margin-left: 8px;
    }

    .badge {
      display: inline-block;
      background: #30446d;
      padding: 2px 10px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #20a37e;
      font-family: 'Poppins', sans-serif;
    }

    .expanded-detail {
      grid-column: 1 / -1;
      background: #0f172f;
      border: 1px solid #3c4e72;
      margin: 0.5rem 0 1rem 0;
      padding: 2rem;
      display: none;
      animation: fadeSlide 0.35s ease;
    }

    .expanded-detail.active {
      display: block;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .detail-container {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }

    .detail-media {
      flex: 1.2;
      min-width: 240px;
    }

    .detail-media img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border: 1px solid #30446d;
    }

    .detail-info {
      flex: 2;
    }

    .detail-info h2 {
      font-family: Arial, sans-serif;
      font-size: 2.5rem;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    .detail-price {
      font-size: 1.8rem;
      font-weight: 700;
      color: #30446d;
      margin: 0.8rem 0;
      font-family: 'Poppins', sans-serif;
    }

    .detail-desc {
      color: #cbd5e6;
      margin-bottom: 1.5rem;
      line-height: 1.5;
      font-family: 'Poppins', sans-serif;
    }

    .specs {
      background: #0a1222;
      padding: 1rem;
      border-left: 3px solid #30446d;
      margin: 1rem 0;
      font-family: 'Poppins', sans-serif;
    }

    .specs p {
      margin: 6px 0;
    }

    .close-detail-btn {
      background: #2c3f5f;
      border: none;
      color: white;
      padding: 8px 20px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: 0.2s;
      font-family: 'Poppins', sans-serif;
    }

    .close-detail-btn:hover {
      background: #783697;
      color: #0a0f1c;
    }

    /* cart expand */
    .add-cart-expand {
      background: #30446d;
      border: none;
      color: white;
      padding: 10px 24px;
      font-weight: bold;
      margin-right: 1rem;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Poppins', sans-serif;
    }

    .add-cart-expand:hover {
      background: #783697;
      color: #0f172a;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      background: #111827;
      border: 1px solid #30446d;
      font-family: Arial, sans-serif;
    }

    .cart-toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1f2a44;
      border-left: 4px solid #94ceeb;
      padding: 12px 20px;
      z-index: 300;
      backdrop-filter: blur(8px);
      font-weight: 500;
      transform: translateX(400px);
      transition: transform 0.3s;
      font-family: Arial, sans-serif;
    }

    .cart-toast.show {
      transform: translateX(0);
    }

    .quick-add {
      background: #30446d;
      border: none;
      color: white;
      padding: 8px 12px;
      margin-top: 12px;
      width: 100%;
      cursor: pointer;
      font-weight: 600;
      font-family: Arial, sans-serif;
      transition: background 0.2s;
    }

    .quick-add:hover {
      background: #5d97b0;
      color: #0f172a;
    }

    /* cart badge*/
    .shopping-cart-badge {
      position: fixed;
      top: 24px;
      right: 40px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      gap: 5px;
      background: #1f2a44;
      padding: 6px 12px;
      border: 1px solid #ae00ff;
      z-index: 101;
    }

    .cart-count {
      background: #94ceeb;
      color: #0f172a;
      padding: 0px 6px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    @media (max-width: 800px) {
      .products-grid {
        gap: 1.2rem;
      }

      .detail-container {
        flex-direction: column;
      }

      .navbar {
        padding: 16px 20px;
      }

      .nav-links {
        gap: 16px;
      }

      .nav-links li a {
        font-size: 12px;
      }

      .shopping-cart-badge {
        top: 16px;
        right: 20px;
        padding: 4px 8px;
      }
    }

    body,
    button,
    input,
    .filter-btn,
    .product-title,
    .price,
    .category,
    .detail-desc,
    .specs,
    .close-detail-btn,
    .add-cart-expand {
      font-family: 'Poppins', sans-serif;
      color: #c2c2c2;
    }

    .detail-info h2 {
      font-family: Arial, sans-serif;
    }
  </style>
</head>

          specs: "Hi-Res audio drivers · ANC noise cancellation · Dual wireless system · Hot-swappable batteries · Premium DAC included"
        },

          desc: "Razer optical gaming keyboard, analog actuation tuning, ultra-low latency response for esports precision.",
          specs: "Razer Analog Optical switches · Adjustable actuation · RGB Chroma lighting · Detachable USB-C cable · Onboard profiles"
        },

        {
          id: 20, name: "HyperX Cloud III Wireless Gaming Headset (Limited Edition)", category: "Headset", price: 599.99,
          badge: "HOT", img: "pr20.jpg",
          desc: "Comfort-focused gaming headset, clear audio tuning, durable build designed for long gaming sessions.",
          specs: "53mm drivers · DTS Headphone:X spatial audio · Detachable noise-cancelling mic · Memory foam cushions · 2.4GHz wireless"
        },

        {
          id: 21, name: "Apex Titan Custom Gaming PC (Ultimate Edition)", category: "PC", price: 14999.99,
          badge: "HOT", img: "pr21.jpg",
          desc: "High-end custom gaming desktop, extreme 4K performance, liquid-cooled stability, built for ultra settings and streaming.",
          specs: "AMD Ryzen 9 9950X3D · RTX 5090 32GB · 128GB DDR5 8000MHz · 8TB PCIe Gen5 NVMe SSD · Custom water cooling loop · 1600W 80+ Titanium PSU"
        }
      ];

      let cart = JSON.parse(localStorage.getItem('nexicore_cart')) || [];
      let activeFilter = "all";
      let expandedProductId = null;

      // currency
      function formatRand(amount) {
        return `R ${amount.toFixed(2)}`;
      }

      // cart object counter
      function updateCartDisplay() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById("cartCounter").innerText = totalItems;
      }
      function saveCart() {
        localStorage.setItem('nexicore_cart', JSON.stringify(cart));
      }

      // add to cart
      function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        const existing = cart.find(i => i.id === productId);
        if (existing) {
          existing.quantity++;
        } else {
          cart.push({ ...product, quantity: 1 });
        }
        saveCart();
        updateCartDisplay();
        showToast(`${product.name} added to cart`);
      }

      function showToast(msg) {
        const toast = document.getElementById("cartToast");
        toast.innerText = `✓ ${msg}`;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      function renderProducts() {
        let filtered = activeFilter === "all" ? products : products.filter(p => p.category === activeFilter);
        const grid = document.getElementById("productsGrid");

        if (filtered.length === 0) {
          grid.innerHTML = `<div class="no-results">No gear found. Adjust filter.</div>`;
          return;
        }

        let gridHtml = "";
        filtered.forEach(product => {
          const isExpanded = (expandedProductId === product.id);

        // products card
        gridHtml += `
        <div class="product-card" data-id="${product.id}">
        <div class="card-img">
                <img src="${product.img}" alt="${product.name}">
              </div>
              <div class="card-info">
                ${product.badge ? `<div class="badge">${product.badge}</div>` : ""}
                <div class="category">${product.category.toUpperCase()}</div>
                <div class="product-title">${product.name}</div>
                <div class="price">
                  ${formatRand(product.price)}
                  ${product.oldPrice ? `<span class="old-price">${formatRand(product.oldPrice)}</span>` : ""}
                </div>
                <button class="quick-add" data-id="${product.id}">+ ADD TO CART</button>
              </div>
            </div>
          `;

          // expanding detail 
          if (isExpanded) {
            gridHtml += `
              <div class="expanded-detail active" data-expand="${product.id}">
                <div class="detail-container">
                  <div class="detail-media">
                    <img src="${product.img}" alt="${product.name}">
                  </div>
                  <div class="detail-info">
                    <h2>${product.name}</h2>
                    <div class="detail-price">${formatRand(product.price)} ${product.oldPrice ? `<span style="font-size:1rem; text-decoration:line-through;">${formatRand(product.oldPrice)}</span>` : ""}</div>
                    <div class="detail-desc">${product.desc}</div>
                    <div class="specs">
                      <strong>Technical specs</strong><br>
                      ${product.specs}
                    </div>
                    <div style="display: flex; gap: 12px; margin-top: 20px;">
                      <button class="add-cart-expand" data-id="${product.id}">Add to Cart</button>
                      <button class="close-detail-btn" data-id="${product.id}">✕ Close details</button>
                    </div>
                  </div>
                </div>
              </div>
            `;
          }
        });

        grid.innerHTML = gridHtml;

        document.querySelectorAll(".quick-add").forEach(btn => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = parseInt(btn.dataset.id, 10);
            addToCart(id);
          });
        });

        // expanding products card
        document.querySelectorAll(".product-card").forEach(card => {
          card.addEventListener("click", (e) => {
            if (e.target.classList.contains("quick-add")) return;
            const id = parseInt(card.dataset.id, 10);
            toggleExpand(id);
          });
        });

        document.querySelectorAll(".close-detail-btn").forEach(btn => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = parseInt(btn.dataset.id, 10);
            if (expandedProductId === id) {
              expandedProductId = null;
              renderProducts();
            }
          });
        });

        // expand add to cart
        document.querySelectorAll(".add-cart-expand").forEach(btn => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = parseInt(btn.dataset.id, 10);
            addToCart(id);
          });
        });
      }

      function toggleExpand(productId) {
        if (expandedProductId === productId) {
          expandedProductId = null;
        } else {
          expandedProductId = productId;
        }
        renderProducts();
        setTimeout(() => {
          const expandedDiv = document.querySelector(`.expanded-detail[data-expand="${productId}"]`);
          if (expandedDiv) {
            expandedDiv.scrollIntoView({ behavior: "smooth", block: "center" });
          }
        }, 50);
      }

      function setFilter(filter) {
        activeFilter = filter;
        expandedProductId = null;
        renderProducts();
        gsap.fromTo(".product-card", { opacity: 0, y: 12 }, { opacity: 1, y: 0, stagger: 0.04, duration: 0.4, ease: "power2.out" });
      }

      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          const filterVal = btn.dataset.filter;
          setFilter(filterVal);
        });
      });

      // cart icon
      document.getElementById("cartIconSimple").addEventListener("click", () => {
        window.location.href = "Cart.html";
      });

      //render
      renderProducts();
      updateCartDisplay();

      // GSAP intro for filter buttons
      gsap.from(".filter-btn", { duration: 0.5, scale: 0.95, opacity: 0, stagger: 0.05, delay: 0.1 });
    })();
</script>
</body>

</html>
